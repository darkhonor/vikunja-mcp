# Filename: release.yml
# Last Modified: 2026-03-15
# Summary: CD pipeline for release builds with SBOM generation
# Compliant With: DoD STIG, NIST SP800-53 Rev 5 (SR-4, SA-11)
# Classification: UNCLASSIFIED
###############################################################################
# Release Pipeline
#
# Runs on version tags (v*) to build, generate SBOM, create a
# GitHub Release with artifacts, and publish a container image to GHCR.
#
# Security Controls:
#   - SR-4: Supply chain provenance via CycloneDX SBOM + SPDX image attestation
#   - SA-10: Provenance records source commit, build inputs, and workflow
#   - SA-11: Build validation before release
#   - CM-5: GITHUB_TOKEN scoped permissions, no external credentials
###############################################################################
---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # GitHub Release creation
  packages: write    # GHCR image push
  id-token: write    # SLSA provenance attestation via OIDC

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Verify bundle exists
        run: test -f dist/index.js

      - name: Run npm audit
        run: npm audit --audit-level=critical

      - name: Generate CycloneDX SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format JSON

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/index.js
            sbom.json

  container:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vikunja-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
